<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Marathon · Race Control</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F2EA;
    --ink: #171717;
    --green: #3A5B22;
    --gold: #D9A63C;
    --grey: #6E6A5E;
    --line: #DCD8CC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-family: 'Anton', sans-serif; font-size: 34px; text-transform: uppercase; }
  h1 span { color: var(--green); }
  .sub { color: var(--grey); font-size: 14px; margin-bottom: 24px; }

  #login { max-width: 380px; margin-top: 24px; }
  input, button { font: inherit; font-size: 16px; }
  input[type=email], input[type=search] {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: #FFFDF7;
  }
  input:focus-visible, button:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .btn {
    margin-top: 10px;
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .note { margin-top: 12px; font-size: 14px; color: var(--grey); }

  #app { display: none; }
  .tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(125px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .tile { background: #FFFDF7; border: 2px solid var(--ink); border-radius: 10px; padding: 14px; }
  .tile .n { font-family: 'Anton', sans-serif; font-size: 34px; line-height: 1; }
  .tile .l { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey); margin-top: 4px; }
  .tile.alert { border-color: var(--gold); background: #FBF3DF; }

  .bar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .bar input[type=search] { flex: 1; min-width: 200px; }
  .bar .btn { width: auto; margin: 0; padding: 10px 16px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #FFFDF7;
    border: 2px solid var(--ink);
    border-radius: 10px;
    overflow: hidden;
  }
  thead th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 10px 12px;
    background: var(--ink);
    color: var(--paper);
  }
  tbody td { padding: 10px 12px; border-top: 1px solid var(--line); font-size: 14px; vertical-align: top; }
  .num { font-family: 'Anton', sans-serif; font-size: 16px; }
  .pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1.5px solid var(--ink);
  }
  .pill.k5 { background: #E4EDD8; }
  .pill.k10 { background: #D8E4ED; }
  .pill.spec { background: #EBE8DE; }
  .giftbtn {
    font-size: 12px;
    font-weight: 700;
    border-radius: 999px;
    border: 1.5px solid var(--ink);
    padding: 4px 12px;
    cursor: pointer;
    background: #FFFDF7;
    white-space: nowrap;
  }
  .giftbtn.got { background: var(--green); color: #FFFDF7; border-color: var(--green); }
  .muted { color: var(--grey); }
  .small { font-size: 12px; color: var(--grey); }
  .tablewrap { overflow-x: auto; }
  #msg { margin-top: 12px; font-size: 14px; color: var(--grey); }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ EDIT THESE DETAILS ============ -->
  <script>
    const CONFIG = {
      SUPABASE_URL: "https://YOUR-PROJECT.supabase.co",
      SUPABASE_ANON_KEY: "YOUR_ANON_KEY",
    };
  </script>
  <!-- ============================================ -->

  <h1>Race <span>Control</span></h1>
  <p class="sub">Birthday Marathon · Crosspark by Twalumba · Mon 3 August 2026</p>

  <div id="login">
    <label for="email" style="font-weight:700; font-size:14px;">Your email</label>
    <input type="email" id="email" autocomplete="email" placeholder="you@example.com" style="margin-top:6px;">
    <button class="btn" id="sendlink">Send me a login link</button>
    <p class="note" id="loginmsg">Only the organiser's email can see any data.</p>
  </div>

  <div id="app">
    <div class="tiles" id="tiles"></div>
    <div class="bar">
      <input type="search" id="q" placeholder="Search name, phone or bib…">
      <button class="btn" id="refresh">Refresh</button>
      <button class="btn" id="csv">Export CSV</button>
    </div>
    <div class="tablewrap">
      <table>
        <thead>
          <tr><th>Bib</th><th>Name</th><th>Phone</th><th>Race</th><th>Shuttle</th><th>Plus one</th><th>Emergency contact</th><th>Gift / pack</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p id="msg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  let guests = [];

  document.getElementById('sendlink').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('loginmsg');
    if (!email) { msg.textContent = 'Enter your email first.'; return; }
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    msg.textContent = error ? 'Could not send link: ' + error.message
                            : 'Link sent. Check your inbox, then come back here.';
  });

  sb.auth.onAuthStateChange((_event, session) => {
    if (session) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      load();
    }
  });

  async function load() {
    const msg = document.getElementById('msg');
    msg.textContent = 'Loading…';
    const { data, error } = await sb.from('guests').select('*').order('race_number');
    if (error) { msg.textContent = 'Could not load guests: ' + error.message; return; }
    guests = data;
    msg.textContent = guests.length ? '' : 'No registrations yet. Share the link!';
    render();
  }

  function render() {
    const q = document.getElementById('q').value.trim().toLowerCase();
    const filtered = q
      ? guests.filter(g =>
          g.name.toLowerCase().includes(q) ||
          g.phone.includes(q) ||
          String(g.race_number).includes(q))
      : guests;

    const plusOnes = guests.filter(g => g.plus_one).length;
    const stats = [
      ['RSVPs', guests.length, ''],
      ['Headcount', guests.length + plusOnes, ''],
      ['5K', guests.filter(g => g.category === '5k').length, ''],
      ['10K', guests.filter(g => g.category === '10k').length, ''],
      ['Cheer squad', guests.filter(g => g.category === 'spectator').length, ''],
      ['Shuttle seats', guests.filter(g => g.shuttle).length, ''],
      ['Packs to hand out', guests.filter(g => !g.gift_received).length, 'alert'],
    ];
    document.getElementById('tiles').innerHTML = stats.map(([l, n, cls]) =>
      '<div class="tile ' + cls + '"><div class="n">' + n + '</div><div class="l">' + l + '</div></div>'
    ).join('');

    const CAT = { '5k': ['5K', 'k5'], '10k': ['10K', 'k10'], 'spectator': ['Cheer', 'spec'] };
    document.getElementById('rows').innerHTML = filtered.map(g => {
      const [label, cls] = CAT[g.category];
      const plus = g.plus_one
        ? esc(g.plus_one_name || 'Yes') + (g.plus_one_age != null ? ' <span class="small">(' + g.plus_one_age + ')</span>' : '')
        : '<span class="muted">—</span>';
      return '<tr>' +
        '<td class="num">' + g.race_number + '</td>' +
        '<td>' + esc(g.name) + '</td>' +
        '<td>' + esc(g.phone) + '</td>' +
        '<td><span class="pill ' + cls + '">' + label + '</span></td>' +
        '<td>' + (g.shuttle ? 'Yes' : '<span class="muted">No</span>') + '</td>' +
        '<td>' + plus + '</td>' +
        '<td>' + esc(g.emergency_name) + ' <span class="small">' + esc(g.emergency_phone) + '</span></td>' +
        '<td><button class="giftbtn ' + (g.gift_received ? 'got' : '') + '" data-id="' + g.id + '">' +
          (g.gift_received ? 'Pack given' : 'Gift in → pack') + '</button></td>' +
      '</tr>';
    }).join('');

    document.querySelectorAll('.giftbtn').forEach(b => b.addEventListener('click', toggleGift));
  }

  async function toggleGift(e) {
    const id = Number(e.target.dataset.id);
    const g = guests.find(x => x.id === id);
    const { error } = await sb.from('guests').update({ gift_received: !g.gift_received }).eq('id', id);
    if (error) { document.getElementById('msg').textContent = 'Update failed: ' + error.message; return; }
    g.gift_received = !g.gift_received;
    render();
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.getElementById('q').addEventListener('input', render);
  document.getElementById('refresh').addEventListener('click', load);

  document.getElementById('csv').addEventListener('click', () => {
    const head = 'race_number,name,phone,dob,category,shuttle,plus_one,plus_one_name,plus_one_age,emergency_name,emergency_phone,waiver_accepted_at,gift_received\n';
    const body = guests.map(g =>
      [g.race_number, g.name, g.phone, g.dob, g.category, g.shuttle,
       g.plus_one, g.plus_one_name || '', g.plus_one_age ?? '',
       g.emergency_name, g.emergency_phone, g.waiver_accepted_at, g.gift_received]
        .map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
    const blob = new Blob([head + body], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'birthday-marathon-guests.csv';
    a.click();
  });
</script>
</body>
</html>
